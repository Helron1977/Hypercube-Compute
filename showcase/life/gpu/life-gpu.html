<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hypercube Neo - Life GPU</title>
    <link rel="stylesheet" href="../../assets/showcase.css">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #050f23;
            color: #fff;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at center, #1a0a16 0%, #050f23 100%);
        }
        canvas {
            max-width: 98vw;
            max-height: 98vh;
            border-radius: 4px;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.5), 0 0 2px rgba(255, 255, 255, 0.1);
        }
        .hub-button {
            position: fixed !important;
            top: 20px !important;
            right: 20px !important;
            z-index: 9999 !important;
            background: rgba(0, 0, 0, 0.6) !important;
            backdrop-filter: blur(10px) !important;
            border: 1px solid rgba(255, 255, 255, 0.2) !important;
            padding: 8px 16px !important;
            border-radius: 8px !important;
            color: #fff !important;
            text-decoration: none !important;
            font-family: 'Inter', sans-serif !important;
            text-transform: uppercase !important;
            letter-spacing: 1px !important;
            font-size: 0.75rem !important;
            transition: all 0.3s ease !important;
        }
        .hub-button:hover {
            background: rgba(0, 242, 255, 0.2) !important;
            border-color: #00f2ff !important;
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.3) !important;
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    <a href="../../index.html" class="hub-button">Back to Hub</a>
    <script type="module" src="./life-gpu.ts"></script>
</body>
</html>
