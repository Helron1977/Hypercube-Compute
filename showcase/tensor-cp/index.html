<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hypercube Neo - Tensor Decomposition</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@300;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/showcase.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-dark: #050a14;
            --accent: #00f2ff;
            --surface: #0a1428;
            --text: #cbd5e1;
            --border-dim: rgba(0, 242, 255, 0.1);
        }
        body {
            background: var(--bg-dark);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            background-image: radial-gradient(circle at 50% 50%, #102040 0%, var(--bg-dark) 100%);
        }
        header {
            padding: 3rem 1rem;
            text-align: center;
            background: rgba(5, 10, 20, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border-dim);
        }
        header h1 {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 400;
            letter-spacing: 4px;
            text-transform: uppercase;
            font-size: 1.5rem;
            margin: 0;
        }
        header p {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 0.5rem;
        }
        .container {
            max-width: 1100px;
            margin: 3rem auto;
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 2rem;
            padding: 0 1rem;
        }
        .panel {
            background: rgba(10, 20, 40, 0.6);
            padding: 2rem;
            border: 1px solid var(--border-dim);
            clip-path: polygon(0 0, 100% 0, 100% calc(100% - 15px), calc(100% - 15px) 100%, 0 100%);
        }
        .panel h3 {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            text-transform: uppercase;
            color: var(--accent);
            margin-top: 0;
            letter-spacing: 1px;
        }
        .controls label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.7rem;
            font-family: 'JetBrains Mono', monospace;
            color: #64748b;
            text-transform: uppercase;
        }
        .controls input, .controls select {
            width: 100%;
            padding: 0.75rem;
            background: #050a14;
            border: 1px solid var(--border-dim);
            color: white;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            margin-bottom: 1.5rem;
            box-sizing: border-box;
        }
        .btn {
            background: var(--surface);
            color: white;
            border: 1px solid var(--border-dim);
            padding: 1rem;
            width: 100%;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 1rem;
        }
        .btn:hover {
            background: var(--accent);
            color: #050a14;
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.2);
        }
        .btn.secondary {
            background: transparent;
            border: 1px solid var(--border-dim);
            color: var(--accent);
        }
        .visuals canvas {
            background: #000;
            border: 1px solid rgba(255,255,255,0.05);
            width: 100% !important;
            height: 350px !important;
        }
        #stats {
            margin-top: 1rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            color: #10b981;
        }
    </style>
</head>
<body>
    <header>
        <a href="../index.html" class="hub-button">Back to Hub</a>
        <h1>Tensor Field Decomposition</h1>
        <p>[ High-rank multi-linear algebra core ]</p>
    </header>

    <div class="container">
        <aside class="panel controls">
            <label>Input Data</label>
            <button class="btn secondary" id="loadSample">Load Sample (5x5x3)</button>
            <input type="file" id="csvFile" style="display:none">
            <button class="btn secondary" onclick="document.getElementById('csvFile').click()">Upload CSV</button>

            <label>Decomposition Rank (K)</label>
            <input type="range" min="1" max="10" value="3" id="rankRange">
            <div style="text-align:right; margin-top:-1rem">Rank: <span id="rankVal">3</span></div>

            <label>Backend Authority</label>
            <select id="backendChoice">
                <option value="cpu">Multi-threaded CPU</option>
                <option value="gpu">WebGPU Tensor Fabric</option>
            </select>

            <button class="btn" id="runBtn">Start Decomposition</button>
            <div id="stats">Ready...</div>
        </aside>

        <main class="panel visuals">
            <h3>Reconstruction Error (MSE)</h3>
            <canvas id="errorChart"></canvas>
            
            <h3>Factor Matrices Preview</h3>
            <div id="factorsGrid" style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem;">
                <!-- Tables will go here -->
            </div>
        </main>
    </div>

    <script type="module">
        // Connection to Hypercube Neo logic
        document.getElementById('rankRange').oninput = (e) => {
            document.getElementById('rankVal').innerText = e.target.value;
        };

        const ctx = document.getElementById('errorChart').getContext('2d');
        const chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: [],
                datasets: [{
                    label: 'MSE Error',
                    borderColor: '#38bdf8',
                    data: [],
                    fill: false,
                    tension: 0.1
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: { type: 'logarithmic', beginAtZero: false }
                }
            }
        });

        document.getElementById('runBtn').onclick = () => {
            const backend = document.getElementById('backendChoice').value;
            window.location.href = `./${backend}/tensor-cp.html?rank=${document.getElementById('rankRange').value}&backend=${backend}`;
        };
    </script>
</body>
</html>
