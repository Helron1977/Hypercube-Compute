<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hypercube Neo - Ocean Showcase 02 (GPU Zero-Stall)</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #050f23;
            color: #fff;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }

        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            pointer-events: none;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px 25px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        #hud h1 {
            margin: 0 0 10px 0;
            font-size: 1.2rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            color: #e0e0e0;
        }

        #hud .stat-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 5px;
            font-size: 0.9rem;
        }

        #hud .stat-label {
            color: #8892b0;
            margin-right: 15px;
        }

        #hud .stat-value {
            font-family: monospace;
            font-weight: 500;
            color: #64ffda;
        }

        #instructions {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            pointer-events: none;
            background: rgba(0, 0, 0, 0.5);
            padding: 10px 20px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #a0aec0;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
        }
    </style>
</head>

<body>
    <!-- Main simulation canvas container (handled by orchestrator) -->

    <div id="instructions">
        <span>🖱️ Click & drag to generate ocean waves & bio-luminescence</span>
    </div>

    <!-- Vite module injection for Neo orchestration -->
    <script type="module" src="./ocean.ts"></script>
</body>

</html>
