<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neo Aero (GPU)</title>
    <style>
        :root {
            --primary: #ff00c8;
            --bg: #020408;
            --hud-bg: rgba(2, 4, 8, 0.7);
        }

        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg);
            color: white;
            font-family: 'Outfit', -apple-system, sans-serif;
            overflow: hidden;
        }

        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at center, #1a0a16 0%, #020408 100%);
        }

        canvas {
            max-width: 95vw;
            max-height: 95vh;
            border-radius: 4px;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.5), 0 0 2px rgba(255, 255, 255, 0.1);
            image-rendering: auto;
        }

        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            background: var(--hud-bg);
            backdrop-filter: blur(20px);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            z-index: 10;
        }

        .hud-item {
            margin-bottom: 12px;
        }

        .hud-label {
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: rgba(255, 255, 255, 0.4);
            margin-bottom: 4px;
        }

        .hud-value {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--primary);
        }

        .back-link {
            position: absolute;
            top: 20px;
            right: 20px;
            text-decoration: none;
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 100px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s;
        }

        .back-link:hover {
            color: white;
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--primary);
        }
    </style>
</head>

<body>
    <div id="hud">
        <div class="hud-item">
            <div class="hud-label">Engine</div>
            <div class="hud-value">Neo Aero (GPU)</div>
        </div>
        <div class="hud-item">
            <div class="hud-label">Performance</div>
            <div id="fps-counter" class="hud-value">-- FPS</div>
        </div>
    </div>

    <a href="../index.html" class="back-link">← HUB</a>

    <div id="canvas-container"></div>

    <script type="module" src="./main.ts"></script>
</body>

</html>
