<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hypercube Neo: GPU Aerodynamics</title>
    <link rel="stylesheet" href="showcase.css">
    <style>
        body {
            background: #020408;
            margin: 0;
            overflow: hidden;
        }

        #hud {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.75);
            color: #00ffcc;
            padding: 15px;
            border-radius: 8px;
            font-family: monospace;
            border: 1px solid rgba(0, 255, 204, 0.3);
            pointer-events: none;
        }

        h2 {
            margin: 0 0 5px 0;
            font-size: 1.1rem;
            color: #fff;
        }

        #stats {
            font-size: 0.9rem;
            margin-bottom: 5px;
        }

        .description {
            font-size: 0.8rem;
            opacity: 0.7;
            margin: 0;
            color: #eee;
        }
    </style>
</head>

<body>
    <div id="hud">
        <h2>Hypercube Neo: GPU Aero</h2>
        <div id="stats">
            <span id="fps">FPS: --</span> |
            <span id="resolution">Res: --</span> |
            <span id="chunks">Chunks: --</span>
        </div>
        <p class="description">
            Zero-Copy WebGPU LBM (D2Q9) with 256-byte aligned storage buffers.
        </p>
    </div>
    <canvas id="display" class="centered-canvas"></canvas>
    <script type="module" src="12-neo-gpu.ts"></script>
</body>

</html>
